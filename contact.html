<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - TaskMaster</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-mode">
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-layer-group"></i> TaskMaster
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Tasks</a></li>
            <li><a href="progress.html">Progress</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="#" id="logout-btn" style="color: #ef4444; border: 1px solid #ef4444; padding: 0.3rem 1rem; border-radius: 20px;"><i class="fas fa-sign-out-alt"></i> Log Out</a></li>
        </ul>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
    </nav>

    <main class="container">
        <header style="margin-bottom: 1rem;">
            <h1 style="font-size: 1.8rem; margin-bottom: 0.2rem;">Let's Connect</h1>
            <p style="font-size: 0.9rem; margin-bottom: 0;">Reach out to us for any feedback, support, or inquiries.</p>
        </header>

        <section class="card full-width" style="max-width: 600px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 1.5rem;">
            <h2 style="margin-bottom: 1rem; font-size: 1.3rem; text-align: center;"><i class="far fa-envelope"></i> Send a Message</h2>
            <form id="contact-form" style="display: flex; flex-direction: column; gap: 0.8rem;" onsubmit="event.preventDefault(); alert('Message successfully sent! (Frontend Demo)');">
                <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                    <label for="name" style="font-weight: 500; color: var(--text-secondary); font-size: 0.9rem;">Full Name</label>
                    <input type="text" id="name" required style="padding: 0.8rem; border: 1px solid var(--card-border); border-radius: 8px; background: var(--input-bg); color: var(--text-primary); font-size: 1rem; transition: all 0.3s ease;">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                    <label for="email" style="font-weight: 500; color: var(--text-secondary); font-size: 0.9rem;">Email Address</label>
                    <input type="email" id="email" required style="padding: 0.8rem; border: 1px solid var(--card-border); border-radius: 8px; background: var(--input-bg); color: var(--text-primary); font-size: 1rem; transition: all 0.3s ease;">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                    <label for="message" style="font-weight: 500; color: var(--text-secondary); font-size: 0.9rem;">Your Message</label>
                    <textarea id="message" rows="3" required style="padding: 0.8rem; border: 1px solid var(--card-border); border-radius: 8px; background: var(--input-bg); color: var(--text-primary); font-size: 1rem; resize: vertical; transition: all 0.3s ease;"></textarea>
                </div>
                
                <button type="submit" class="github-btn" style="justify-content: center; width: 100%; border: none; cursor: pointer; background: var(--text-primary); color: var(--card-bg); margin-top: 0.5rem; padding: 0.8rem;">
                    <i class="fas fa-paper-plane"></i> Submit
                </button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
    <style>
        /* Extra hover glow inside contact inputs */
        #contact-form input:focus, #contact-form textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: var(--card-bg);
        }
    </style>
</body>
</html>
