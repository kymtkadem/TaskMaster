<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - TaskMaster</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-mode" style="overflow: hidden;">
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-layer-group"></i> TaskMaster
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Tasks</a></li>
            <li><a href="progress.html" class="active">Progress</a></li>
            <li><a href="badges.html">Badges</a></li>
        </ul>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <button id="theme-toggle" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button id="logout-btn" class="logout-btn" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.5rem 1.2rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </button>
        </div>
    </nav>

    <main class="dashboard-layout" style="max-width: 1600px; margin: 1rem auto; padding: 0 2rem; height: calc(100vh - 100px); display: flex; flex-direction: column; gap: 1rem;">
        <header style="margin-bottom: 0.5rem; text-align: left;">
            <h1 style="font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text-primary); margin: 0;">Progress Dashboard</h1>
            <p style="color: var(--text-secondary); opacity: 0.8; font-size: 0.85rem;">One-view performance analysis.</p>
        </header>

        <!-- Compact Scoreboard -->
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;">
            <div class="card" style="text-align: center; padding: 1rem; position: relative; overflow: hidden; height: 90px; display: flex; flex-direction: column; justify-content: center;">
                <h3 style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.2rem; font-weight: 600;">Total Tasks</h3>
                <p id="stat-total" style="font-size: 1.8rem; font-weight: 800; margin: 0; background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">0</p>
                <i class="fas fa-tasks" style="position: absolute; right: -5px; bottom: -5px; font-size: 2.5rem; opacity: 0.05;"></i>
            </div>
            <div class="card" style="text-align: center; padding: 1rem; position: relative; overflow: hidden; height: 90px; display: flex; flex-direction: column; justify-content: center;">
                <h3 style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.2rem; font-weight: 600;">Completed</h3>
                <p id="stat-completed" style="font-size: 1.8rem; font-weight: 800; margin: 0; color: #10b981;">0</p>
                <i class="fas fa-check-double" style="position: absolute; right: -5px; bottom: -5px; font-size: 2.5rem; opacity: 0.05;"></i>
            </div>
            <div class="card" style="text-align: center; padding: 1rem; position: relative; overflow: hidden; height: 90px; display: flex; flex-direction: column; justify-content: center;">
                <h3 style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.2rem; font-weight: 600;">Success Rate</h3>
                <p id="stat-rate" style="font-size: 1.8rem; font-weight: 800; margin: 0; color: #8b5cf6;">0%</p>
                <i class="fas fa-percentage" style="position: absolute; right: -5px; bottom: -5px; font-size: 2.5rem; opacity: 0.05;"></i>
            </div>
            <div class="card" style="text-align: center; padding: 1rem; position: relative; overflow: hidden; height: 90px; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(135deg, rgba(251, 191, 36, 0.05) 0%, rgba(245, 158, 11, 0.05) 100%);">
                <h3 style="color: #d97706; font-size: 0.8rem; margin-bottom: 0.2rem; font-weight: 700;">Streak</h3>
                <p id="stat-streak" style="font-size: 1.8rem; font-weight: 800; margin: 0; color: #f59e0b;">0</p>
                <i class="fas fa-fire" style="position: absolute; right: -5px; bottom: -5px; font-size: 2.5rem; opacity: 0.1;"></i>
            </div>
        </div>

        <!-- Charts Row -->
        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 1rem; flex: 1; min-height: 0;">
            <div class="card" style="padding: 1.2rem; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <h2 style="font-size: 1rem; margin-bottom: 1rem; font-weight: 700;">Task Distribution</h2>
                <div style="width: 100%; max-width: 250px; position: relative;">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
            <div class="card" style="padding: 1.2rem; display: flex; flex-direction: column;">
                <h2 style="font-size: 1rem; margin-bottom: 1rem; font-weight: 700;">Productivity Focus (Last 7 Days)</h2>
                <div style="flex: 1; min-height: 0; width: 100%;">
                    <canvas id="productivityChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        let mainChart, prodChart;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const tasksCol = collection(db, "users", user.uid, "tasks");
                onSnapshot(tasksCol, (snapshot) => {
                    const tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    updateCharts(tasks);
                });

                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        document.getElementById('stat-streak').innerText = docSnap.data().currentStreak || 0;
                    }
                });
            }
        });

        function updateCharts(tasks) {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const rate = total === 0 ? 0 : Math.round((completed / total) * 100);
            
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-completed').innerText = completed;
            document.getElementById('stat-rate').innerText = rate + '%';

            const isDark = document.body.classList.contains('dark-mode');
            const textColor = isDark ? '#cbd5e1' : '#475569';
            const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';

            // --- Doughnut Chart ---
            const ctx1 = document.getElementById('progressChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'Pending'],
                    datasets: [{
                        data: [completed, total - completed],
                        backgroundColor: ['#10b981', '#f43f5e'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: textColor, boxWidth: 12, font: { size: 11 } } }
                    },
                    cutout: '75%'
                }
            });

            // --- Productivity Focus (Line Chart) ---
            const last7Days = [...Array(7)].map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i));
                return d.toISOString().split('T')[0];
            });

            const completedByDay = last7Days.map(day => {
                return tasks.filter(t => {
                    if (!t.completed || !t.createdAt) return false;
                    const dateStr = t.createdAt.toDate().toISOString().split('T')[0];
                    return dateStr === day;
                }).length;
            });

            const ctx2 = document.getElementById('productivityChart').getContext('2d');
            if (prodChart) prodChart.destroy();
            prodChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: last7Days.map(d => d.split('-').slice(1).reverse().join('/')),
                    datasets: [{
                        label: 'Tasks Completed',
                        data: completedByDay,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: '#6366f1'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor, stepSize: 1, font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: textColor, font: { size: 10 } } }
                    }
                }
            });
        }
    </script>
</body>
</html>
