<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Your Daily To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="light-mode">
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-layer-group"></i> TaskMaster
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Tasks</a></li>
            <li><a href="progress.html">Progress</a></li>
            <li><a href="badges.html">Badges</a></li>
            <li><a href="#" id="logout-btn" style="color: #ef4444; border: 1px solid #ef4444; padding: 0.3rem 1rem; border-radius: 20px;"><i class="fas fa-sign-out-alt"></i> Log Out</a></li>
        </ul>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
    </nav>

    <main class="container" style="max-width: 1200px; margin-top: 0.5rem; margin-bottom: 0.5rem; padding: 1rem 2.5rem;">
        <header style="margin-bottom: 1rem; text-align: left;">
            <h1 style="font-size: 1.6rem; margin-bottom: 0;">My Tasks</h1>
            <p style="font-size: 0.9rem; font-weight: 600; color: #6366f1; margin: 0.2rem 0;" id="user-greeting">Welcome!</p>
            <p style="font-size: 0.85rem; margin-bottom: 0;">Stay organized and focus on what matters.</p>
        </header>

        <div style="display: grid; grid-template-columns: 320px 1fr; gap: 2rem; align-items: start;">
            <!-- Left Side: Task Creation & Filters -->
            <div style="display: flex; flex-direction: column; gap: 1rem; position: sticky; top: 80px;">
                <section class="task-input-section" style="background: var(--item-bg); padding: 1rem; border-radius: 16px; border: 1px solid var(--card-border);">
                    <h2 style="font-size: 1.1rem; margin-bottom: 0.8rem; color: var(--primary-color);"><i class="fas fa-edit"></i> Create Task</h2>
                    <form id="task-form" style="display: flex; flex-direction: column; align-items: stretch; gap: 0.8rem; margin-bottom: 0;">
                        <input type="text" id="task-input" required autocomplete="off" placeholder="What do you need to do?" style="padding: 0.8rem;">
                        <input type="datetime-local" id="task-datetime" title="Optional Due Date" style="padding: 0.8rem;">
                        <button type="submit" id="add-btn" style="justify-content: center; width: 100%; border-radius: 12px; padding: 0.8rem; font-size: 1rem; margin-top: 0.2rem;">
                            <i class="fas fa-plus"></i> Add Task
                        </button>
                    </form>
                </section>

                <section class="filters" style="display: flex; flex-direction: column; gap: 0.3rem; background: var(--item-bg); padding: 1rem; border-radius: 16px; border: 1px solid var(--card-border); margin: 0; align-items: stretch;">
                    <h2 style="font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text-primary);"><i class="fas fa-filter"></i> Filters</h2>
                    <button class="filter-btn active" data-filter="all" style="text-align: left; padding: 0.6rem 1rem;">All Tasks</button>
                    <button class="filter-btn" data-filter="pending" style="text-align: left; padding: 0.6rem 1rem;">Pending</button>
                    <button class="filter-btn" data-filter="overdue" style="text-align: left; padding: 0.6rem 1rem;">Overdue</button>
                    <button class="filter-btn" data-filter="completed" style="text-align: left; padding: 0.6rem 1rem;">Completed</button>
                </section>
            </div>

            <!-- Right Side: Scrollable Task List -->
            <section class="task-list-section" style="background: var(--item-bg); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--card-border); height: calc(100vh - 150px); min-height: 350px; overflow-y: auto; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);">
                <ul id="task-list" style="display: flex; flex-direction: column; gap: 0.8rem;">
                    <!-- Tasks will be inserted here dynamically by JavaScript -->
                </ul>
            </section>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
