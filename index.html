<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Premium Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Flatpickr (Premium Date/Time Picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body class="light-mode">
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-layer-group"></i> TaskMaster
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Tasks</a></li>
            <li><a href="progress.html">Progress</a></li>
            <li><a href="badges.html">Badges</a></li>
        </ul>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <button id="theme-toggle" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button id="logout-btn" class="logout-btn" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.5rem 1.2rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </button>
        </div>
    </nav>

    <main class="dashboard-layout" style="max-width: 1300px; margin: 1.5rem auto; padding: 0 2rem;">
        <header style="margin-bottom: 2rem; text-align: left;">
            <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 800; color: var(--text-primary); margin: 0;">My Tasks</h1>
            <div style="display: flex; align-items: center; gap: 0.8rem; margin-top: 0.2rem;">
                <p style="font-size: 0.9rem; font-weight: 600; color: #6366f1; margin: 0;" id="user-greeting">Welcome!</p>
            </div>
        </header>

        <div style="display: grid; grid-template-columns: 320px 1fr; gap: 2rem; align-items: start;">
            <!-- Left Side: Task Creation & Filters -->
            <div style="display: flex; flex-direction: column; gap: 1rem; position: sticky; top: 80px;">
                <section class="task-input-section" style="background: var(--item-bg); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--card-border); box-shadow: var(--glass-shadow);">
                    <h2 style="font-size: 1.1rem; margin-bottom: 1rem; color: var(--text-primary); font-weight: 700;"><i class="fas fa-plus-circle" style="color: #6366f1;"></i> Create Task</h2>
                    <form id="task-form" style="display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 0;">
                        <div class="input-group">
                            <i class="fas fa-edit"></i>
                            <input type="text" id="task-input" required autocomplete="off" placeholder="What needs to be done?">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; width: 100%;">
                            <div class="input-group">
                                <i class="fas fa-calendar-day"></i>
                                <input type="text" id="task-date" placeholder="dd-mm-yyyy" required>
                            </div>
                            <div class="input-group">
                                <i class="fas fa-clock"></i>
                                <input type="text" id="task-time" placeholder="Time" required>
                            </div>
                        </div>
                        <button type="submit" id="add-btn" style="justify-content: center; width: 100%; border-radius: 12px; padding: 0.8rem; font-size: 1rem; margin-top: 0.2rem; font-weight: 700;">
                            <i class="fas fa-plus"></i> Add Task
                        </button>
                    </form>
                </section>

                <section class="filters" style="background: var(--item-bg); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--card-border); box-shadow: var(--glass-shadow);">
                    <h2 style="font-size: 1.1rem; margin-bottom: 1rem; color: var(--text-primary); font-weight: 700;"><i class="fas fa-filter" style="color: #a855f7;"></i> Filters</h2>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <button class="filter-btn active" data-filter="all"><i class="fas fa-list-ul"></i> All Tasks</button>
                        <button class="filter-btn" data-filter="pending"><i class="fas fa-clock"></i> Pending</button>
                        <button class="filter-btn" data-filter="overdue"><i class="fas fa-exclamation-circle"></i> Overdue</button>
                        <button class="filter-btn" data-filter="completed"><i class="fas fa-check-circle"></i> Completed</button>
                    </div>
                </section>
            </div>

            <!-- Right Side: Scrollable Task List -->
            <section class="task-list-section" style="background: var(--item-bg); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--card-border); height: calc(100vh - 150px); min-height: 450px; overflow-y: auto; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);">
                <div>
                    <h3 id="list-title" style="font-size: 1.2rem; margin-bottom: 1.2rem; color: var(--text-primary); font-weight: 700; display: flex; align-items: center; gap: 0.6rem;">
                        <i class="fas fa-list-ul" style="color: #6366f1;"></i> All Tasks
                    </h3>
                    <ul id="task-list" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Tasks injected here -->
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <script type="module" src="script.js"></script>
    <script>
        // Initialize Premium Date Picker
        flatpickr("#task-date", {
            dateFormat: "d-m-Y",
            placeholder: "Select Date",
            locale: "en",
            minDate: "today"
        });

        flatpickr("#task-time", {
            enableTime: true,
            noCalendar: true,
            dateFormat: "H:i",
            time_24hr: true,
            placeholder: "Select Time",
            locale: "en"
        });
    </script>
</body>
</html>
