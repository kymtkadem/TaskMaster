<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 Achievements - TaskMaster</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 1.2rem;
            margin-top: 1.5rem;
        }
        .badge-card {
            background: var(--item-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem 0.6rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            opacity: 0.3;
            filter: grayscale(1);
            --badge-clr: #94a3b8;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .badge-card.earned {
            opacity: 1;
            filter: grayscale(0);
            border-color: var(--badge-clr);
            box-shadow: 0 8px 24px rgba(var(--badge-clr-rgb), 0.15);
            background: linear-gradient(135deg, var(--item-bg) 0%, rgba(var(--badge-clr-rgb), 0.08) 100%);
        }
        .badge-card.earned:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(var(--badge-clr-rgb), 0.3);
            background: linear-gradient(135deg, var(--item-bg) 0%, rgba(var(--badge-clr-rgb), 0.12) 100%);
        }
        .badge-icon {
            font-size: 2.5rem;
            margin-bottom: 0.8rem;
            display: block;
            color: var(--badge-clr);
            transition: transform 0.3s ease;
        }
        .badge-card.earned:hover .badge-icon {
            transform: scale(1.2);
        }
        .badge-card.earned .badge-icon {
            filter: drop-shadow(0 0 12px rgba(var(--badge-clr-rgb), 0.6));
        }
        .badge-name {
            font-weight: 800;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 0.3rem;
            color: var(--text-primary);
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .badge-desc {
            font-size: 0.65rem;
            color: var(--text-secondary);
            line-height: 1.3;
            display: block;
            font-weight: 500;
        }
    </style>
</head>
<body class="light-mode">
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-layer-group"></i> TaskMaster
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Tasks</a></li>
            <li><a href="progress.html">Progress</a></li>
            <li><a href="badges.html" class="active">Badges</a></li>
        </ul>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <button id="theme-toggle" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button id="logout-btn" class="logout-btn" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.5rem 1.2rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </button>
        </div>
    </nav>

    <main class="dashboard-layout" style="max-width: 1600px; margin: 1.5rem auto; padding: 0 2.5rem;">
        <header style="margin-bottom: 2rem; text-align: left;">
            <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin: 0;">Achievement Hall</h1>
            <p style="color: var(--text-secondary); opacity: 0.8; font-size: 1rem;">The definitive collection of your 30 unique achievements.</p>
        </header>

        <div class="badges-grid" id="badges-container">
            <!-- Injected by JS -->
        </div>
    </main>

    <script type="module" src="script.js"></script>
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const badgeData = [
            // Tasks (8)
            { id: 't5', icon: 'fa-seedling', name: 'First Steps', req: '5 Tasks', clr: '#fbbf24', rgb: '251, 191, 36' },
            { id: 't25', icon: 'fa-leaf', name: 'Productive', req: '25 Tasks', clr: '#10b981', rgb: '16, 185, 129' },
            { id: 't50', icon: 'fa-briefcase', name: 'Busy Bee', req: '50 Tasks', clr: '#3b82f6', rgb: '59, 130, 246' },
            { id: 't100', icon: 'fa-rocket', name: 'Task Master', req: '100 Tasks', clr: '#8b5cf6', rgb: '139, 92, 246' },
            { id: 't250', icon: 'fa-star', name: 'Elite', req: '250 Tasks', clr: '#f59e0b', rgb: '245, 158, 11' },
            { id: 'tl', icon: 'fa-crown', name: 'Legend', req: '500 Tasks', clr: '#d946ef', rgb: '217, 70, 239' },
            { id: 'tt', icon: 'fa-gem', name: 'Titan', req: '1000 Tasks', clr: '#06b6d4', rgb: '6, 182, 212' },
            { id: 'tg', icon: 'fa-infinity', name: 'God Mode', req: '2500 Tasks', clr: '#000000', rgb: '0, 0, 0' },

            // Streaks (8)
            { id: 's3', icon: 'fa-shoe-prints', name: 'Hattrick', req: '3 Day Streak', clr: '#0ea5e9', rgb: '14, 165, 233' },
            { id: 's7', icon: 'fa-calendar-week', name: 'Warrior', req: '7 Day Streak', clr: '#ef4444', rgb: '239, 68, 68' },
            { id: 's14', icon: 'fa-shield-alt', name: 'Fortnight', req: '14 Days', clr: '#6366f1', rgb: '99, 102, 241' },
            { id: 's21', icon: 'fa-mountain', name: 'Consistent', req: '21 Days', clr: '#14b8a6', rgb: '20, 184, 166' },
            { id: 's30', icon: 'fa-medal', name: 'Monthly', req: '30 Days', clr: '#a855f7', rgb: '168, 85, 247' },
            { id: 's50', icon: 'fa-fire', name: 'Veteran', req: '50 Days', clr: '#dc2626', rgb: '220, 38, 38' },
            { id: 's100', icon: 'fa-dragon', name: 'Centurion', req: '100 Days', clr: '#7c2d12', rgb: '124, 45, 18' },
            { id: 's365', icon: 'fa-sun', name: 'Immortal', req: '365 Days', clr: '#fcd34d', rgb: '252, 211, 77' },

            // Performance (7)
            { id: 'f10', icon: 'fa-bolt', name: 'Focused', req: '10/Day', clr: '#22c55e', rgb: '34, 197, 94' },
            { id: 'f25', icon: 'fa-skull', name: 'Beast Mode', req: '25/Day', clr: '#450a0a', rgb: '69, 10, 10' },
            { id: 'eb', icon: 'fa-sun', name: 'Early Bird', req: '50 < 8AM', clr: '#fbbf24', rgb: '251, 191, 36' },
            { id: 'no', icon: 'fa-moon', name: 'Night Owl', req: '50 > 10PM', clr: '#1e1b4b', rgb: '30, 27, 75' },
            { id: 'da', icon: 'fa-bullseye', name: 'Deadline Ace', req: '100 OnTime', clr: '#1d4ed8', rgb: '29, 78, 216' },
            { id: 'pm', icon: 'fa-brain', name: 'Pro Master', req: '98% Rate', clr: '#4f46e5', rgb: '79, 70, 229' },
            { id: 'qu', icon: 'fa-stopwatch', name: 'Speed Demon', req: '10 Fast', clr: '#71717a', rgb: '113, 113, 122' },

            // Special (7)
            { id: 'cs', icon: 'fa-broom', name: 'Clean Slate', req: '50 ZeroPend', clr: '#059669', rgb: '5, 150, 105' },
            { id: 'lo', icon: 'fa-heart', name: 'Loyalty', req: '6 Months', clr: '#be123c', rgb: '190, 18, 60' },
            { id: 'nm', icon: 'fa-user-plus', name: 'New Me', req: '10 Done', clr: '#0891b2', rgb: '8, 145, 178' },
            { id: 'ex', icon: 'fa-compass', name: 'Explorer', req: '50 Visits', clr: '#475569', rgb: '71, 85, 105' },
            { id: 'sh', icon: 'fa-share-alt', name: 'Social Star', req: '10 Shares', clr: '#db2777', rgb: '219, 39, 119' },
            { id: 'ar', icon: 'fa-box-open', name: 'Archivist', req: '500 Archive', clr: '#92400e', rgb: '146, 64, 14' },
            { id: 'ha', icon: 'fa-hammer', name: 'Hard Worker', req: '15 Weekend', clr: '#dc2626', rgb: '220, 38, 38' }
        ];

        const container = document.getElementById('badges-container');
        badgeData.forEach(b => {
            const card = document.createElement('div');
            card.className = 'badge-card';
            card.id = `badge-${b.id}`;
            card.style.setProperty('--badge-clr', b.clr);
            card.style.setProperty('--badge-clr-rgb', b.rgb);
            card.innerHTML = `
                <i class="fas ${b.icon} badge-icon"></i>
                <span class="badge-name">${b.name}</span>
                <span class="badge-desc">${b.req}</span>
            `;
            container.appendChild(card);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const earned = snap.data().badges || [];
                        earned.forEach(id => {
                            const el = document.getElementById(`badge-${id}`);
                            if (el) el.classList.add('earned');
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>
