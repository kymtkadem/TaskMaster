<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TaskMaster</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-mode">
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-layer-group"></i> TaskMaster
        </div>
        <button id="theme-toggle" aria-label="Toggle Dark Mode" style="position: absolute; right: 5%;">
            <i class="fas fa-moon"></i>
        </button>
    </nav>

    <main class="container" style="margin-top: 2rem; margin-bottom: 2rem; max-width: 900px;">
        <header style="margin-bottom: 1rem;">
            <h1 style="font-size: 1.8rem; margin-bottom: 0.2rem;">Join TaskMaster</h1>
            <p style="font-size: 0.9rem; margin-bottom: 0;">Create an account to permanently sync your progress and statistics.</p>
        </header>

        <section class="card full-width" style="max-width: 400px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 1.5rem;">
            <form id="signup-form" style="display: flex; flex-direction: column; gap: 1rem;">
                
                <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                    <label for="username" style="font-weight: 500; font-size: 0.9rem;">Username</label>
                    <input type="text" id="username" required style="padding: 0.8rem; border: 1px solid var(--card-border); border-radius: 8px; background: var(--input-bg); color: var(--text-primary); font-size: 1rem;">
                </div>

                <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                    <label for="email" style="font-weight: 500; font-size: 0.9rem;">Email Address</label>
                    <input type="email" id="email" required style="padding: 0.8rem; border: 1px solid var(--card-border); border-radius: 8px; background: var(--input-bg); color: var(--text-primary); font-size: 1rem;">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                    <label for="password" style="font-weight: 500; font-size: 0.9rem;">Password</label>
                    <input type="password" id="password" required style="padding: 0.8rem; border: 1px solid var(--card-border); border-radius: 8px; background: var(--input-bg); color: var(--text-primary); font-size: 1rem;">
                </div>
                
                <button type="submit" class="github-btn" style="justify-content: center; width: 100%; border: none; cursor: pointer; background: var(--primary-gradient); color: white; margin-top: 0.5rem; font-size: 1rem; padding: 0.8rem;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
                
                <p id="error-message" style="color: #ef4444; font-size: 0.85rem; text-align: center; display: none;"></p>

                <p style="text-align: center; color: var(--text-secondary); font-size: 0.95rem; margin-top: 1rem;">
                    Already have an account? <a href="login.html" style="color: #6366f1; text-decoration: none; font-weight: 600;">Log In here</a>
                </p>
            </form>
        </section>
    </main>

    <script type="module">
        import { handleSignUp } from './auth-handler.js';
        import { initTheme } from './theme-handler.js';
        
        initTheme();
        
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('error-message');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            errorElement.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            
            const result = await handleSignUp(email, password, username);
            if (!result.success) {
                errorElement.textContent = result.error;
                errorElement.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });
    </script>
    <style>
        #signup-form input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: var(--card-bg);
        }
    </style>
</body>
</html>
